name: logic_lab
description: A production-ready Flutter app demonstrating number reversal logic with Clean Architecture and BLoC.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  responsive_framework: ^1.4.0
  get_it: ^7.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
